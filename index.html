<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detection</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Fake News Detection System</h1>

    <form method="POST">

        <textarea
            name="news"
            placeholder="Paste news here..."
            required>{{ news_text }}</textarea>

        <br>

        <button type="submit">
            Check News
        </button>

    </form>

    {% if prediction %}

    <h2>{{ prediction }}</h2>

    {% endif %}

</div>

</body>
</html>
